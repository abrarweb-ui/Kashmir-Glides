<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kashmir Travel Gallery | Kashmir Glide Tour & Travels</title>
<meta name="description" content="Browse stunning photos from our Kashmir tours — Gulmarg snow, Dal Lake shikaras, Pahalgam valleys, Sonamarg glaciers and more."/>
<link rel="canonical" href="https://kashmirglide.com/gallery.html"/>
<link rel="stylesheet" href="css/style.css"/>
<style>
.masonry-grid{columns:4;column-gap:.75rem}
.masonry-item{break-inside:avoid;margin-bottom:.75rem;overflow:hidden;border-radius:4px;cursor:pointer;position:relative}
.masonry-item img{width:100%;display:block;transition:transform .5s ease}
.masonry-item:hover img{transform:scale(1.05)}
.masonry-item .overlay{position:absolute;inset:0;background:rgba(29,54,16,0);transition:.3s;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:white;opacity:0}
.masonry-item:hover .overlay{background:rgba(29,54,16,.35);opacity:1}
.cat-filters{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:2rem}
.cat-btn{padding:.45rem 1.1rem;border:1.5px solid rgba(44,44,44,.15);border-radius:100px;font-size:.8rem;cursor:pointer;transition:var(--transition);background:var(--white);font-family:'Jost',sans-serif;color:var(--charcoal-light)}
.cat-btn.active,.cat-btn:hover{background:var(--green);border-color:var(--green);color:var(--white)}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.3s}
.lightbox.open{opacity:1;pointer-events:all}
.lightbox img{max-width:90vw;max-height:88vh;object-fit:contain;border-radius:4px}
.lb-close{position:absolute;top:1.5rem;right:1.5rem;color:white;font-size:2rem;cursor:pointer;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,.1)}
.lb-close:hover{background:rgba(255,255,255,.2)}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);color:white;font-size:2.5rem;cursor:pointer;width:50px;height:50px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,.1)}
.lb-nav:hover{background:rgba(255,255,255,.2)}
.lb-prev{left:1.5rem}.lb-next{right:1.5rem}
@media(max-width:900px){.masonry-grid{columns:3}}
@media(max-width:600px){.masonry-grid{columns:2}}
@media(max-width:400px){.masonry-grid{columns:1}}
</style>
</head>
<body>
<div id="header-placeholder"></div>
<div class="page-hero">
  <div class="page-hero-bg" style="background-image:url('https://images.unsplash.com/photo-1566837497312-7be7830ae9b1?q=80&w=1400&auto=format&fit=crop')"></div>
  <div class="page-hero-overlay"></div>
  <div class="page-hero-content"><h1>Gallery</h1>
    <div class="breadcrumb"><a href="index.html">Home</a><span class="breadcrumb-sep">›</span><span>Gallery</span></div>
  </div>
</div>
<section>
  <div class="section-inner">
    <div class="section-header" data-reveal>
      <div class="section-label">Visual Stories</div>
      <h2 class="section-heading">Kashmir Through <span>Our Lens</span></h2>
    </div>
    <div class="cat-filters" data-reveal>
      <button class="cat-btn active" data-cat="all">All Photos</button>
      <button class="cat-btn" data-cat="gulmarg">Gulmarg</button>
      <button class="cat-btn" data-cat="pahalgam">Pahalgam</button>
      <button class="cat-btn" data-cat="sonamarg">Sonamarg</button>
      <button class="cat-btn" data-cat="dal-lake">Dal Lake</button>
      <button class="cat-btn" data-cat="winter">Winter</button>
    </div>
    <div class="masonry-grid" id="galleryGrid"></div>
  </div>
</section>

<div class="lightbox" id="lightbox">
  <div class="lb-close" id="lbClose">✕</div>
  <div class="lb-nav lb-prev" id="lbPrev">‹</div>
  <img id="lbImg" src="" alt="Kashmir"/>
  <div class="lb-nav lb-next" id="lbNext">›</div>
</div>

<div class="cta-banner">
  <div class="cta-banner-inner">
    <h2>Your Photos Could Be <em>Here</em></h2>
    <p>Book a tour with us and become part of our Kashmir story gallery.</p>
    <a href="book.html" class="btn-gold">Plan Your Trip</a>
  </div>
</div>
<div id="footer-placeholder"></div>
<script src="js/layout.js"></script><script src="js/utils.js"></script>
<script>
KG_LAYOUT.inject();
KG.init();

var STATIC_PHOTOS = [
  {url:'https://images.unsplash.com/photo-1566837497312-7be7830ae9b1?q=80&w=1400&auto=format&fit=crop',cat:'gulmarg',alt:'Gulmarg Snow'},
  {url:'https://images.unsplash.com/photo-1651509094074-e8acaeb84d8f?q=80&w=1400&auto=format&fit=crop',cat:'dal-lake',alt:'Dal Lake Shikara'},
  {url:'https://images.unsplash.com/photo-1609115452706-76f80756dbf0?q=80&w=1400&auto=format&fit=crop',cat:'pahalgam',alt:'Pahalgam Valley'},
  {url:'https://images.unsplash.com/photo-1685716271205-83a5ac2ba63b?q=80&w=1400&auto=format&fit=crop',cat:'sonamarg',alt:'Sonamarg Glacier'},
  {url:'https://images.unsplash.com/photo-1590998012650-33f0dfe40269?q=80&w=1400&auto=format&fit=crop',cat:'gulmarg',alt:'Tangmarg Forest'},
  {url:'https://images.unsplash.com/photo-1566837500831-838ff7486b28?q=80&w=1400&auto=format&fit=crop',cat:'gulmarg',alt:'Gulmarg Winter'},
  {url:'https://images.unsplash.com/photo-1666545380922-1296a4ac9521?q=80&w=1400&auto=format&fit=crop',cat:'pahalgam',alt:'Mountain Drive'},
  {url:'https://images.unsplash.com/photo-1651147741136-59dc4f7d36ba?q=80&w=1400&auto=format&fit=crop',cat:'sonamarg',alt:'Valley Meadow'},
  {url:'https://images.unsplash.com/photo-1715457573748-8e8a70b2c1be?q=80&w=1400&auto=format&fit=crop',cat:'winter',alt:'Snow Landscape'},
  {url:'https://images.unsplash.com/photo-1566837497312-7be7830ae9b1?q=80&w=1400&auto=format&fit=crop',cat:'winter',alt:'Snowy Peaks'},
  {url:'https://images.unsplash.com/photo-1685716271205-83a5ac2ba63b?q=80&w=1400&auto=format&fit=crop',cat:'winter',alt:'Winter View'},
  {url:'https://images.unsplash.com/photo-1609115452706-76f80756dbf0?q=80&w=1400&auto=format&fit=crop',cat:'pahalgam',alt:'Green Valley'},
  {url:'https://images.unsplash.com/photo-1651509094074-e8acaeb84d8f?q=80&w=1400&auto=format&fit=crop',cat:'dal-lake',alt:'Lake Reflection'},
  {url:'https://images.unsplash.com/photo-1590998012650-33f0dfe40269?q=80&w=1400&auto=format&fit=crop',cat:'sonamarg',alt:'Mountain Trail'},
  {url:'https://images.unsplash.com/photo-1566837500831-838ff7486b28?q=80&w=1400&auto=format&fit=crop',cat:'dal-lake',alt:'Dal Lake Sunset'},
  {url:'https://images.unsplash.com/photo-1715457573748-8e8a70b2c1be?q=80&w=1400&auto=format&fit=crop',cat:'gulmarg',alt:'Gulmarg Peaks'},
];

var ALL_PHOTOS = STATIC_PHOTOS.slice();
var filtered = ALL_PHOTOS.slice();
var activeCat = 'all';
var lbIdx = 0;

function renderGallery() {
  var grid = document.getElementById('galleryGrid');
  if (!filtered.length) {
    grid.innerHTML = '<p style="text-align:center;padding:3rem;color:var(--charcoal-light);grid-column:1/-1">No photos in this category yet.</p>';
    return;
  }
  grid.innerHTML = filtered.map(function(p, i) {
    return '<div class="masonry-item" data-idx="'+i+'"><img src="'+p.url+'" alt="'+(p.alt||'Kashmir')+'" loading="lazy"/><div class="overlay">🔍</div></div>';
  }).join('');
  grid.querySelectorAll('.masonry-item').forEach(function(el) {
    el.addEventListener('click', function() { openLB(parseInt(el.dataset.idx)); });
  });
}

function applyFilter(cat) {
  activeCat = cat;
  filtered = cat === 'all' ? ALL_PHOTOS.slice() : ALL_PHOTOS.filter(function(p) { return p.cat === cat; });
  renderGallery();
}

function openLB(idx) {
  lbIdx = idx;
  document.getElementById('lbImg').src = filtered[idx].url;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLB() { document.getElementById('lightbox').classList.remove('open'); document.body.style.overflow = ''; }
document.getElementById('lbClose').onclick = closeLB;
document.getElementById('lbPrev').onclick = function() { lbIdx = (lbIdx - 1 + filtered.length) % filtered.length; document.getElementById('lbImg').src = filtered[lbIdx].url; };
document.getElementById('lbNext').onclick = function() { lbIdx = (lbIdx + 1) % filtered.length; document.getElementById('lbImg').src = filtered[lbIdx].url; };
document.getElementById('lightbox').addEventListener('click', function(e) { if (e.target === this) closeLB(); });
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLB();
  if (e.key === 'ArrowLeft') document.getElementById('lbPrev').click();
  if (e.key === 'ArrowRight') document.getElementById('lbNext').click();
});

document.querySelectorAll('.cat-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    applyFilter(btn.dataset.cat);
  });
});

// Load gallery from Firestore — overrides static if data exists
function loadFirestoreGallery(db) {
  db.collection('gallery').orderBy('createdAt','desc').get().then(function(snap) {
    if (!snap.empty) {
      ALL_PHOTOS = [];
      snap.forEach(function(d) {
        var g = d.data();
        if (g.url) ALL_PHOTOS.push({ url: g.url, cat: g.category || 'all', alt: g.caption || 'Kashmir' });
      });
    }
    applyFilter(activeCat);
  }).catch(function() { applyFilter(activeCat); });
}

// Bootstrap Firebase then load
initFirebase(function(db) {
  loadFirestoreGallery(db);
}, function() {
  applyFilter(activeCat); // static fallback
});
</script>
</body>
</html>
